{% extends 'generic/object_list.html' %}

{% block bulk_buttons %}
<div class="bulk-action-buttons">
  <button type="submit"
          formaction="{% url 'plugins:netbox_windows_dhcp:dhcpscope_bulk_maintenance' %}"
          class="btn btn-warning">
    <i class="mdi mdi-pause-circle-outline"></i> Bulk Maintenance Mode
  </button>
  <button type="submit"
          formaction="{% url 'plugins:netbox_windows_dhcp:dhcpscope_bulk_delete' %}"
          class="btn btn-danger">
    <i class="mdi mdi-trash-can-outline"></i> Delete Selected
  </button>
</div>
{% endblock bulk_buttons %}

{% block content %}
{% if not push_scope_info %}
<div class="alert alert-warning d-flex align-items-center mb-3" role="alert">
  <i class="mdi mdi-lock me-2"></i>
  <span>Scopes are <strong>read-only</strong> — enable <em>Push Scope Info</em> in
    <a href="{% url 'plugins:netbox_windows_dhcp:settings' %}">plugin settings</a>
    to allow edits.</span>
</div>
{% endif %}
{{ block.super }}
{% endblock %}
